# RBAC for the workbench ServiceAccount to deploy vLLM and exec into pods.
#
# Apply:
#   oc apply -f k8s/vllm-rollout-manager-rbac.yaml
#
# Workbench SA (created by RHOAI): grpoxtrainerwb1
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vllm-rollout-manager
  namespace: grpoxtrainer
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["create", "get", "list", "patch", "update", "delete"]
  - apiGroups: [""]
    resources: ["services", "pods"]
    verbs: ["create", "get", "list", "patch", "update", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "get", "list", "patch", "update", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "list", "patch", "update", "delete"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["create", "get", "list", "patch", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: grpoxtrainerwb1-vllm-rollout
  namespace: grpoxtrainer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vllm-rollout-manager
subjects:
  - kind: ServiceAccount
    name: grpoxtrainerwb1
    namespace: grpoxtrainer
